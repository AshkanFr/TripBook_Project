<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script>
    (function () {
        var theme = localStorage.getItem("tripbook-theme") || "light";
        var html = document.documentElement;

        function applyTheme() {
            var body = document.body;

            if (theme === "dark") {
                html.classList.add("dark-mode");
                if (body) body.classList.add("dark-mode");
            } else {
                html.classList.remove("dark-mode");
                if (body) body.classList.remove("dark-mode");
            }
        }

        if (document.body) {
            applyTheme();
        } else {
            document.addEventListener("DOMContentLoaded", applyTheme);
        }
    })();
</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <button type="button" class="theme-toggle" data-theme-toggle aria-label="تغییر حالت نمایش"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 15.5A8.5 8.5 0 0 1 8.5 4 7 7 0 1 0 20 15.5Z"/></svg></button>
            <div class="login-mark">
                <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 17c4-7 8-7 12-10"/>
                    <circle cx="6" cy="17" r="2.5"/>
                    <circle cx="18" cy="7" r="2.5"/>
                </svg>
            </div>

            <h1>TripBook</h1>
            <p class="signup-text">برای ساخت حساب کاربری، اطلاعات زیر را وارد کنید.</p>

            <form action="home.html" method="get">
                <div class="form-group">
                    <label>ایمیل خود را وارد کنید</label>
                    <input class="ltr-input" type="text" placeholder="example@email.com" >
                </div>

                <div class="form-group" style="margin-top: 14px;">
                    <label>رمز عبور وارد کنید</label>
                    <input class="ltr-input" type="password" placeholder="••••••••" >
                </div>

                <div class="form-group" style="margin-top: 14px;">
                    <label>رمز عبور را تکرار کنید</label>
                    <input class="ltr-input" type="password" placeholder="••••••••" >
                </div>

                <button type="submit" class="btn">ساخت حساب کاربری</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
