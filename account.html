<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>account</title>
    <script>
    (function () {
        var theme = localStorage.getItem("tripbook-theme") || "light";
        var html = document.documentElement;

        function applyTheme() {
            var body = document.body;

            if (theme === "dark") {
                html.classList.add("dark-mode");
                if (body) body.classList.add("dark-mode");
            } else {
                html.classList.remove("dark-mode");
                if (body) body.classList.remove("dark-mode");
            }
        }

        if (document.body) {
            applyTheme();
        } else {
            document.addEventListener("DOMContentLoaded", applyTheme);
        }
    })();
</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Trip<span>Book</span></h2>
                <p>سامانه خرید بلیط سفر</p>
            </div>

            <nav class="menu">
                <a href="home.html" class=""><span class="menu-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10.5 12 4l8 6.5"/><path d="M6.5 10v9h11v-9"/><path d="M10 19v-5h4v5"/></svg></span><span>خانه</span></a>
                <a href="reservations.html" class=""><span class="menu-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4v3"/><path d="M17 4v3"/><path d="M5 8h14"/><rect x="5" y="6" width="14" height="14" rx="3"/><path d="m9 14 2 2 4-5"/></svg></span><span>رزروهای من</span></a>
                <a href="tickets.html" class=""><span class="menu-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8.5a2.5 2.5 0 0 0 0 5V17a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3.5a2.5 2.5 0 0 0 0-5V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v1.5Z"/><path d="M9 8h6"/><path d="M9 16h6"/><path d="M12 5v14"/></svg></span><span>بلیط‌های من</span></a>
                <a href="wallet.html" class=""><span class="menu-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h13a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7.5A2.5 2.5 0 0 1 5.5 5H17"/><path d="M16 13h4"/><path d="M16 13.01v-.01"/></svg></span><span>کیف پول</span></a>
                <a href="payments.html" class=""><span class="menu-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="6" width="16" height="12" rx="3"/><path d="M4 10h16"/><path d="M8 15h3"/><path d="M14 15h2"/></svg></span><span>پرداخت‌ها</span></a>
                <a href="account.html" class="active"><span class="menu-icon"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 19a6.5 6.5 0 0 1 13 0"/></svg></span><span>حساب کاربری</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="navbar">
                <div class="navbar-title">
                    <h1>حساب کاربری</h1>
                </div>

                <div class="navbar-actions">
                    <a class="logout-link" href="index.html">خروج</a>

                    <button type="button" class="theme-toggle" data-theme-toggle aria-label="تغییر حالت نمایش"><svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 15.5A8.5 8.5 0 0 1 8.5 4 7 7 0 1 0 20 15.5Z"/></svg></button>

                    <a class="account-chip" href="account.html">
                        <span>حساب کاربری</span>
                        <div class="avatar">A</div>
                    </a>
                </div>
            </header>

            <div class="page-content">
                <div class="page-title">
                    <h2>حساب کاربری</h2>
                </div>

                <div class="two-column">
                    <section class="section">
                        <h3>اطلاعات شخصی</h3>

                        <form>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>نام</label>
                                    <input type="text" value="علی">
                                </div>

                                <div class="form-group">
                                    <label>نام خانوادگی</label>
                                    <input type="text" value="احمدی">
                                </div>

                                <div class="form-group">
                                    <label>کد ملی</label>
                                    <input type="text" value="0012345678">
                                </div>

                                <div class="form-group">
                                    <label>شماره تماس</label>
                                    <input type="text" value="09123456789">
                                </div>

                                <div class="form-group">
                                    <label>ایمیل</label>
                                    <input type="email" value="ashkan@example.com">
                                </div>

                                <div class="form-group">
                                    <label>تاریخ تولد</label>
                                    <input type="text" class="persian-date-input" value="۱۳۸۴/۰۵/۱۲" readonly>
                                </div>

                                <div class="form-group">
                                    <label>جنسیت</label>
                                    <select>
                                        <option>مرد</option>
                                        <option>زن</option>
                                        <option>ترجیح می‌دهم نگویم</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="button">ذخیره تغییرات</button>
                            </div>
                        </form>
                    </section>

                    <section class="section">
                        <h3>وضعیت حساب</h3>

                        <div class="info-grid" style="grid-template-columns: 1fr;">
                            <div class="info-card">
                                <h4>وضعیت کاربر</h4>
                                <p>فعال</p>
                            </div>

                            <div class="info-card">
                                <h4>بلیط‌های رزرو شده</h4>
                                <p>۳</p>
                            </div>

                            <div class="info-card">
                                <h4>بلیط‌های خریداری شده</h4>
                                <p>۲</p>
                            </div>

                            <div class="info-card">
                                <h4>موجودی کیف پول</h4>
                                <p>۱,۵۰۰,۰۰۰ تومان</p>
                            </div>
                        </div>
                    </section>
                </div>

                <section class="section">
                    <h3>تنظیمات ورود</h3>

                    <form>
                        <div class="form-grid-3">
                            <div class="form-group">
                                <label>رمز عبور فعلی</label>
                                <input type="password" placeholder="••••••••">
                            </div>

                            <div class="form-group">
                                <label>رمز عبور جدید</label>
                                <input type="password" placeholder="••••••••">
                            </div>

                            <div class="form-group">
                                <label>تکرار رمز عبور</label>
                                <input type="password" placeholder="••••••••">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button">تغییر رمز عبور</button>
                            <a href="index.html" class="btn logout-account">
                                <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M10 6H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h4"/>
                                    <path d="M14 8l4 4-4 4"/>
                                    <path d="M18 12H9"/>
                                </svg>
                                <span>خروج از حساب</span>
                            </a>
                        </div>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
